<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Calcy - Smart Calculator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#06142e,#0a1f44,#05112a);
padding:20px;
}

.calculator{
width:400px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
padding:25px;
box-shadow:
0 0 20px rgba(59,130,246,.25),
0 0 50px rgba(59,130,246,.15);
}

.logo{
text-align:center;
font-size:32px;
font-weight:700;
color:white;
margin-bottom:20px;
text-shadow:
0 0 10px rgba(59,130,246,.5),
0 0 20px rgba(59,130,246,.3);
}

#screen{
width:100%;
height:80px;
border:none;
outline:none;
border-radius:15px;
padding:15px;
font-size:32px;
font-weight:bold;
text-align:right;
background:rgba(255,255,255,.08);
color:white;
margin-bottom:20px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

button{
height:65px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:600;
cursor:pointer;
background:rgba(255,255,255,.08);
color:white;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
background:rgba(59,130,246,.25);
box-shadow:0 0 15px rgba(59,130,246,.35);
}

.equal{
grid-row:span 2;
background:#2563eb;
}

.equal:hover{
background:#3b82f6;
}

.red{
background:#ef4444;
}

.red:hover{
background:#dc2626;
}
</style>

</head>
<body>

<div class="calculator">

<div class="logo">
🧮 My Calcy
</div>

<input type="text" id="screen" readonly>

<div class="buttons">

<button class="red" onclick="clearScreen()">C</button>
<button class="red" onclick="deleteLast()">⌫</button>
<button onclick="append('/')">÷</button>
<button onclick="append('*')">×</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('-')">−</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('+')">+</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button class="equal" onclick="calculate()">=</button>

<button onclick="append('0')">0</button>
<button onclick="append('.')">.</button>

</div>

</div>

<script>
const screen = document.getElementById("screen");

function append(value){
screen.value += value;
}

function clearScreen(){
screen.value = "";
}

function deleteLast(){
screen.value = screen.value.slice(0,-1);
}

function calculate(){
try{
screen.value = eval(screen.value);
}
catch{
screen.value = "Error";
}
}
</script>

</body>
</html>
